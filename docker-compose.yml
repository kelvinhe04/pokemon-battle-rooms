services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/pokemon_battle_rooms
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/backend/src:/app/apps/backend/src

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PUBLIC_API_URL: http://localhost:3001
      PUBLIC_WS_URL: ws://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/app.config.ts:/app/apps/frontend/app.config.ts

volumes:
  mongo-data:
